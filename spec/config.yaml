# ===========================================================================
# Special host values (server-host / admin-server-host)
# ===========================================================================
special_host_values:
  values: ["*4", "!4", "*6", "!6", "*"]
  source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/io/fixtures/fixtures.yaml#L235

# ===========================================================================
# CLI flags affecting config
# ===========================================================================
cli:
  dump_config:
    flag: "--dump-config"
    # Prints the fully-resolved config (defaults + overrides) and exits 0.
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/io/test_cli.py#L136
  dump_config_stable:
    # Re-reading a dumped config and re-dumping is idempotent.
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/io/test_cli.py#L189
  example_flag:
    flag: "--example"
    # Prints the example config file template.
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/src/PostgREST/Config.hs#L624-L625
  nonexistent_config_file_fatal:
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/io/fixtures/fixtures.yaml#L22

# ===========================================================================
# Gaps: behaviors not traceable to a single source line in v14.12, or out of
# scope for black-box conformance.
# ===========================================================================
gaps:
  - "Connection-string augmentation (addFallbackAppName / addTargetSessionAttrs) is documented only via doctests in Config.hs#L549-L607; effect is on the wire to Postgres, not observable via HTTP, so no conformance case."
  - "db-pre-config / db-pre-config hook semantics are exercised only by the db-settings golden file (no-defaults-with-db-other-authenticator.config); a runtime HTTP assertion was not located in v14.12 test/spec."
  - "internal-schema-cache-* keys (Config.hs#L306-L308) are internal test hooks; not part of the public docs ToC, no dedicated conformance case."
  - "log-query HTTP-observable effect (Config.hs#L290) is logged to stderr only; covered by test_io.py log tests, not assertable as an HTTP response in this harness."
  - "server-unix-socket / server-unix-socket-mode runtime socket binding is not exercisable through the HTTP conformance runner (requires a unix socket transport)."
