# Behavior model: OpenAPI document generation
#
# Area scope: OpenAPI 3.0 (emitted as Swagger 2.0) document generation rules,
# descriptions sourced from COMMENTs, and security schemes.
#
# PostgREST version pinned: v14.12
# Primary source: src/PostgREST/Response/OpenAPI.hs
#   https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/src/PostgREST/Response/OpenAPI.hs
# Behavior tests: test/spec/Feature/OpenApi/*.hs
# Docs: https://postgrest.org/en/v14/references/api/openapi.html
#
# NOTE: PostgREST emits a Swagger 2.0 document (the top-level field is
# `"swagger": "2.0"`), built via the `Data.Swagger` (swagger2) library. The
# AGENT_PLAN names this area "OpenAPI 3.0"; the actual on-the-wire artifact in
# v14.12 is Swagger 2.0. Bier must match the wire format byte-for-byte, so this
# model describes Swagger 2.0 shapes. Conformance cases [1650..1699].

version: v14.12

entries:
  # -------------------------------------------------------------------------
  # Root document & content negotiation
  # -------------------------------------------------------------------------
  - id: openapi/root/media-type
    claim: >
      GET / negotiates the OpenAPI document. It is served for
      `Accept: application/openapi+json` and for `Accept: application/json`,
      with Content-Type `application/openapi+json; charset=utf-8` and
      `application/json; charset=utf-8` respectively (RootSpec.hs#L15 GET, #L24
      GET). HEAD / with application/openapi+json returns 200 with an empty body
      and no Content-Length header (OpenApiSpec.hs#L22-29: methodHead "/",
      matchStatus 200, matchHeaderAbsent hContentLength).
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/OpenApi/OpenApiSpec.hs#L22
    cases: [1650, 1651, 1681]

  - id: openapi/root/non-root-406
    claim: >
      Requesting application/openapi+json on a non-root path (e.g. /items)
      yields 406 Not Acceptable. An unsupported media type (e.g. text/csv) on
      the root path also yields 406.
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/OpenApi/OpenApiSpec.hs#L31
    cases: [1652, 1653]

  - id: openapi/root/swagger-version-info
    claim: >
      The document has top-level `"swagger": "2.0"`, and `info.title` defaults
      to "PostgREST API" and `info.description` to "This is a dynamic API
      generated by PostgREST" when the exposed schema has no COMMENT.
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/src/PostgREST/Response/OpenAPI.hs#L398
    cases: [1654]

  - id: openapi/root/external-docs
    claim: >
      `externalDocs.url` is `https://postgrest.org/en/<docsVersion>/references/api.html`
      and externalDocs.description is "PostgREST Documentation".
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/src/PostgREST/Response/OpenAPI.hs#L401
    cases: [1655]

  - id: openapi/root/db-root-spec
    claim: >
      The db-root-spec config option (PGRST_DB_ROOT_SPEC / pgrst.db_root_spec,
      alias root-spec) overrides the entire root OpenAPI document with a
      function's return value. When set to a function name (e.g. db-root-spec
      = "root"), GET / no longer returns the generated Swagger document; instead
      it invokes that function and returns its body verbatim. ApiRequest's
      getResource maps the root path [] to ResourceRoutine when configDbRootSpec
      is Just qi (otherwise ResourceSchema). The documented example function
      returns {"swagger":"2.0","info":{"title":"Overridden","description":"This
      is a my own API"}} and `curl http://localhost:3000` returns exactly that.
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/src/PostgREST/ApiRequest.hs#L120
    cases: [1682]

  # -------------------------------------------------------------------------
  # Descriptions sourced from COMMENTs
  # -------------------------------------------------------------------------
  - id: openapi/comments/schema-title-description
    claim: >
      The COMMENT on the exposed schema seeds info.title/info.description:
      the first line (up to the first "\n") becomes info.title, the remainder
      (after stripping leading newlines) becomes info.description.
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/src/PostgREST/Response/OpenAPI.hs#L416
    cases: [1656]

  - id: openapi/comments/table-summary-description
    claim: >
      A table/view COMMENT seeds each operation's summary (first line) and
      description (remaining lines, leading newlines stripped). A single-line
      COMMENT yields summary only and no description key.
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/src/PostgREST/Response/OpenAPI.hs#L316
    cases: [1657, 1658]

  - id: openapi/comments/column-description
    claim: >
      A column COMMENT becomes the property `description`. For a primary key,
      "Note:\nThis is a Primary Key.<pk/>" is appended (preceded by the comment
      and a blank line if a comment exists). For a single-column M2O/O2O foreign
      key the FK note "This is a Foreign Key to `<tbl>.<col>`.<fk table='<tbl>'
      column='<col>'/>" is appended.
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/src/PostgREST/Response/OpenAPI.hs#L133
    cases: [1659, 1660]

  - id: openapi/rpc/summary-description
    claim: >
      A function COMMENT seeds the RPC path-item operation summary/description
      the same way (first line -> summary, rest -> description).
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/src/PostgREST/Response/OpenAPI.hs#L354
    cases: [1670]

  # -------------------------------------------------------------------------
  # Table path items, parameters & definitions
  # -------------------------------------------------------------------------
  - id: openapi/table/path-parameters
    claim: >
      For each table the GET parameters are, in order: one
      $ref:#/parameters/rowFilter.<table>.<col> per column, then select, order,
      range, rangeUnit, offset, limit, preferCount. POST parameters are
      body.<table>, select, preferPost.
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/src/PostgREST/Response/OpenAPI.hs#L322
    cases: [1661]

  - id: openapi/table/response-status
    claim: >
      GET has responses 200 ("OK", array of #/definitions/<table>) and 206
      ("Partial Content"). POST has 201 ("Created"); PATCH and DELETE have 204
      ("No Content"). POST/PATCH/DELETE are emitted only when the table is
      insertable/updatable/deletable.
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/src/PostgREST/Response/OpenAPI.hs#L324
    cases: [1662, 1663]

  - id: openapi/table/definition
    claim: >
      definitions.<table> is `type: object` with description from the table
      COMMENT, a property per column, and a `required` array of the NOT NULL
      columns. Views produce the same shape but with no `required` key when no
      column is non-nullable.
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/src/PostgREST/Response/OpenAPI.hs#L103
    cases: [1664]

  # -------------------------------------------------------------------------
  # Type mapping & defaults
  # -------------------------------------------------------------------------
  - id: openapi/types/mapping
    claim: >
      PostgreSQL->Swagger mapping: character varying/character/text -> string;
      boolean -> boolean; smallint/integer/bigint -> integer (format int32 for
      smallint/integer, int64 for bigint); numeric/real/double precision ->
      number; json/jsonb -> no type, only format; arrays -> type array with
      items typed from the element type (json[]/jsonb[] items are {}). format is
      the verbatim column type except smallint/integer->int32, bigint->int64.
      character(n) carries maxLength n.
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/src/PostgREST/Response/OpenAPI.hs#L59
    cases: [1665, 1666, 1667]

  - id: openapi/types/enum
    claim: >
      An enum column gets `type: string`, `format: <enum type name>`, and an
      `enum` array listing the labels in declaration order.
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/src/PostgREST/Response/OpenAPI.hs#L115
    cases: [1668]

  - id: openapi/defaults/detection
    claim: >
      Column defaults are surfaced as the property `default`, JSON-decoded:
      text default -> "default" (string), boolean false -> false, integer 42 ->
      42, numeric 42.2 -> 42.2, date -> "1900-01-01", time -> "13:00:00". String
      types strip the `::type` cast suffix and the surrounding quotes.
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/src/PostgREST/Response/OpenAPI.hs#L93
    cases: [1669]

  # -------------------------------------------------------------------------
  # RPC path items
  # -------------------------------------------------------------------------
  - id: openapi/rpc/get-params
    claim: >
      For a non-VOLATILE function the GET path-item lists one query parameter
      per argument (in: query). Scalar args use type/format from the type;
      array args use type:string (format <type>[]); a VARIADIC arg uses
      type:array with collectionFormat:multi and a typed items. `required` is
      true for args without a DEFAULT, false otherwise. OUT params are omitted.
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/src/PostgREST/Response/OpenAPI.hs#L190
    cases: [1671, 1672]

  - id: openapi/rpc/post-body
    claim: >
      The POST path-item has parameters [args (body), $ref preferParams]. The
      args body schema is an object with a property per argument and a
      `required` array of the no-DEFAULT, non-OUT args. The schema description
      is the function COMMENT (title + "\n\n" + description).
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/src/PostgREST/Response/OpenAPI.hs#L219
    cases: [1673]

  - id: openapi/rpc/volatility-methods
    claim: >
      VOLATILE functions emit a POST path item only; STABLE and IMMUTABLE
      functions emit both GET and POST path items.
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/src/PostgREST/Response/OpenAPI.hs#L366
    cases: [1674]

  # -------------------------------------------------------------------------
  # openapi-mode: privileges
  # -------------------------------------------------------------------------
  - id: openapi/mode/follow-privileges
    claim: >
      In the default openapi-mode (follow-privileges) a table/function the
      request role lacks privileges on is omitted from paths. The privileged
      TABLE #/paths//authors_only is hidden for anonymous (OpenApiSpec.hs#L212
      "doesn't include privileged table for anonymous", Nothing at #L216) and
      appears with the privileged JWT (#L218, tag at #L223). The privileged
      FUNCTION #/paths//rpc/privileged_hello is hidden for anonymous
      (OpenApiSpec.hs#L1010 "doesn't include privileged function for anonymous",
      Nothing at #L1014) and appears with the privileged JWT (#L1016, tag at
      #L1019).
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/OpenApi/OpenApiSpec.hs#L1010
    cases: [1675, 1676]

  - id: openapi/mode/ignore-privileges
    claim: >
      With openapi-mode=ignore-privileges every exposed table/function is
      included regardless of the request role's privileges.
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/OpenApi/IgnorePrivOpenApiSpec.hs#L34
    cases: [1677]

  - id: openapi/mode/disabled
    claim: >
      With openapi-mode=disabled, GET / returns 404 with the PGRST126 error
      body {"code":"PGRST126","details":null,"hint":null,"message":"Root
      endpoint metadata is disabled"}.
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/OpenApi/DisabledOpenApiSpec.hs#L15
    cases: [1678]

  # -------------------------------------------------------------------------
  # Security schemes
  # -------------------------------------------------------------------------
  - id: openapi/security/default-absent
    claim: >
      By default the document has neither a top-level `security` nor a
      `securityDefinitions` key.
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/OpenApi/OpenApiSpec.hs#L1095
    cases: [1679]

  - id: openapi/security/active
    claim: >
      With openapi-security-active=true the document carries
      `security: [ { "JWT": [] } ]` and `securityDefinitions.JWT` =
      { type: apiKey, in: header, name: Authorization, description:
      'Add the token prepending "Bearer " (without quotes) to it' }.
    source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/OpenApi/SecurityOpenApiSpec.hs#L19
    cases: [1680]

gaps:
  - >
    openapi-server-proxy-uri (ProxySpec.hs#L13) only asserts the doc still
    validates against the OpenAPI schema; it does not assert the resulting
    host/basePath/schemes values, so no precise black-box body assertion can be
    traced to a source line. Behavior is modelled in src OpenAPI.hs#L419
    (pickProxy) but lacks a value-level test. Logged, not cased.
  - >
    The `preferParams` empty-enum suppression (OpenApiSpec.hs#L1088) and the
    Prefer enum value lists (OpenAPI.hs#L171) are real but the parameters block
    requires the full param-definition table; covered indirectly by the table
    path-parameter $ref case rather than a dedicated enum-values assertion.
  - >
    Content-Type negotiation precedence between application/openapi+json and
    text/csv/single-object at the root is only partially traced; CSV at root is
    406 (cased) but the full produces/consumes media list (OpenAPI.hs#L408) is
    not individually asserted by a Feature test.
