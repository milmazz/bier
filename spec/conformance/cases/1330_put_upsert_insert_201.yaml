id: 1330
feature: representations/put/single-upsert-insert-201
request:
  method: PUT
  path: /items?id=eq.10102
  headers:
    Prefer: "return=representation"
    Content-Type: application/json
  body: [{ "id": 10102 }]
schema: representations
# The target id MUST NOT exist for PUT to be an INSERT (-> 201); an existing
# row would make it a REPLACE (200, case 1331). items is seeded with rows
# 1..15, so use an id guaranteed outside the seed range — the same trick as
# 1364 (999999) and 1372 (10101), distinct from both so the cases stay
# independent. The harness never executes `preconditions:` blocks, so absence
# must hold in the seed itself, not via a precondition.
expect:
  status: 201
  headers:
    Content-Type: application/json; charset=utf-8
    Preference-Applied: "return=representation"
  body_exact: [{ "id": 10102 }]
notes: >-
  PUT single upsert that INSERTS a new row (PK not present) with
  return=representation yields 201 + JSON array body. Status semantics
  (inserted => 201) per Response.hs#L154-L158. The Preference-Applied:
  return=representation echo is DERIVED FROM SOURCE, not from the cited test:
  the upstream PUT-insert test (UpsertSpec.hs#L370-L375) asserts only
  matchStatus=201 and does NOT assert Preference-Applied. The echo is produced
  because responsePreferences passes preferRepresentation through for any
  MutateReadPlan{} (Response.hs#L287-L289) and the SingleUpsert dispatch emits
  it via prefAppliedHeader (Response.hs#L149,L158).
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/src/PostgREST/Response.hs#L158
