id: 1663
feature: openapi/table/response-status
request:
  method: GET
  path: /
  headers: { Accept: application/json }
schema: openapi
preconditions: []
expect:
  status: 200
  body_jsonpath:
    - { path: "$.paths['/child_entities'].get.responses['200'].schema.type", equals: "array" }
    - { path: "$.paths['/child_entities'].get.responses['200'].schema.items['$ref']", equals: "#/definitions/child_entities" }
notes: "GET 200 response schema is an array of the table definition. Mirrors OpenApiSpec.hs:124-143"
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/OpenApi/OpenApiSpec.hs#L124
