id: 1203
feature: ordering/nulls/nullsfirst
request:
  method: GET
  path: /no_pk?order=a.nullsfirst
  headers: { Accept: application/json }
schema: ordering
preconditions: []
expect:
  status: 200
  headers:
    Content-Range: "0-2/*"
  body_exact:
    - { "a": null, "b": null }
    - { "a": "1", "b": "0" }
    - { "a": "2", "b": "0" }
notes: "by a column with nulls first (no direction; default ascending for non-null rows)."
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Query/QuerySpec.hs#L1089
