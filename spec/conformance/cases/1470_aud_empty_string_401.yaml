id: 1470
feature: auth/audience/empty-string-mismatch
request:
  method: GET
  path: /authors_only
  headers: { Accept: application/json }
  jwt:
    sign_with: hs256_test_secret
    payload: { "exp": 9999999999, "role": "postgrest_test_author", "id": "jdoe", "aud": "" }
schema: auth
config:
  jwt-aud: youraudience
preconditions: []
expect:
  status: 401
  body_exact: { "code": "PGRST303", "details": null, "hint": null, "message": "JWT not in audience" }
notes: "Empty string aud is a non-matching value -> PGRST303."
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Auth/AudienceJwtSecretSpec.hs#L43
