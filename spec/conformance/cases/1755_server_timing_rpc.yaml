id: 1755
feature: observability/server-timing/rpc
request:
  method: POST
  path: /rpc/ret_point_overloaded
  headers: { Content-Type: application/json }
  body: { "x": 1, "y": 2 }
schema: observability
config:
  server-timing-enabled: true
preconditions: []
expect:
  status: 200
  headers_present: [Server-Timing]
  headers_match:
    Server-Timing: "plan;dur=[0-9]+\\.[0-9]+.*transaction;dur=[0-9]+\\.[0-9]+"
  body_exact: { "x": 1, "y": 2 }
notes: >
  An RPC call (200) emits the full Server-Timing metric set. Mirrors
  ServerTimingSpec.hs:67-75.
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Query/ServerTimingSpec.hs#L67
