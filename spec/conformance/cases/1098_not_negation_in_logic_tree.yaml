id: 1098
feature: operators/not/logic_tree
request:
  method: GET
  path: /entities?and=(arr.not.cs.{1,2,3},and(id.not.eq.2,name.not.like.*3))&select=id
  headers: { Accept: application/json }
schema: operators
preconditions: []
expect:
  status: 200
  headers:
    Content-Type: application/json; charset=utf-8
  body_exact: [{ "id": 1 }]
notes: >
  The `not` prefix is usable on each operator inside and()/or() logic trees:
  here not.cs (array), not.eq, not.like. Mirrors AndOrParamsSpec.hs
  'operators with not' / 'eq, cs, like can be negated'.
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Query/AndOrParamsSpec.hs#L187
