id: 1601
feature: content_negotiation/json/browser-accept
request:
  method: GET
  path: /items?id=eq.1
  headers: { Accept: "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" }
schema: test
preconditions: []
expect:
  status: 200
  headers:
    Content-Type: application/json; charset=utf-8
  body_exact:
    - { "id": 1 }
notes: "A browser-style Accept header containing */* resolves to JSON. Mirrors RawOutputTypesSpec Firefox/Chrome accept headers."
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Query/RawOutputTypesSpec.hs#L17
