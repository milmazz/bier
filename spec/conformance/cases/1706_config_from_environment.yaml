id: 1706
feature: config/sources/environment-only
request:
  kind: cli
  flag: "--dump-config"
schema: config
config:
  env:
    PGRST_DB_SCHEMAS: "multi,tenant,setup"
    PGRST_DB_MAX_ROWS: "1000"
    PGRST_SERVER_PORT: "80"
    PGRST_LOG_LEVEL: "info"
preconditions: []
expect:
  exit_code: 0
  dump_contains:
    - 'db-schemas = "multi,tenant,setup"'
    - 'db-max-rows = 1000'
    - 'server-port = 80'
    - 'log-level = "info"'
notes: "Config is read directly from PGRST_* environment variables with no config file. Mirrors test_cli.py:test_expected_config_from_environment."
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/io/test_cli.py#L151
