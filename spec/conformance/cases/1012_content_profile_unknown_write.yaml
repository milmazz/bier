id: 1012
feature: url_grammar/profile/unacceptable
request:
  method: POST
  path: /children
  headers:
    Content-Type: application/json
    Content-Profile: unknown
  body: { "name": "child 4", "parent_id": 4 }
schema: multi
preconditions: []
expect:
  status: 406
  body_jsonpath:
    - { path: "$.code", equals: PGRST106 }
    - { path: "$.message", equals: "Invalid schema: unknown" }
notes: "Unknown Content-Profile on write -> UnacceptableSchema (PGRST106, 406). Mirrors MultipleSchemaSpec 'fails when inserting on an unknown schema' (POST /children, Content-Profile: unknown)"
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Query/MultipleSchemaSpec.hs#L150
