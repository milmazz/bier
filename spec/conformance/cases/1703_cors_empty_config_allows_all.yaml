id: 1703
feature: config/server-cors-allowed-origins/empty-allows-all
request:
  method: OPTIONS
  path: /items
  headers:
    Accept: "*/*"
    Origin: http://anyorigin.com
    Access-Control-Request-Method: POST
    Access-Control-Request-Headers: Content-Type
schema: config
config:
  db-schemas: test
  db-anon-role: postgrest_test_anonymous
  server-cors-allowed-origins: ""
preconditions: []
expect:
  status: 200
  headers:
    Access-Control-Allow-Origin: "*"
  body_jsonpath: []
notes: "Empty (but present) CORS config allows all origins; preflight returns '*' and lists POST in allowed methods. Mirrors test_io.py:test_preflight_request_with_empty_cors_allowed_origin_config."
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/io/test_io.py#L1322
