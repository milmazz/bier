id: 1015
feature: url_grammar/reserved-params/limit-offset
request:
  method: GET
  path: /items?order=id.asc&limit=2&offset=1
  headers: { Accept: application/json }
schema: test
preconditions: []
expect:
  status: 200
  headers:
    Content-Type: application/json; charset=utf-8
  body_exact:
    - { "id": 2 }
    - { "id": 3 }
notes: "limit and offset are reserved-embeddable params folded into ranges by getRanges/QueryParams; offset ending is internally rewritten to limit"
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/src/PostgREST/ApiRequest/QueryParams.hs#L142
