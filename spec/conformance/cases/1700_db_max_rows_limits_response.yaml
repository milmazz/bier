id: 1700
feature: config/db-max-rows/restricts-results
request:
  method: GET
  path: /items?order=id
  headers: { Accept: application/json }
schema: config
config:
  db-schemas: test
  db-anon-role: postgrest_test_anonymous
  db-max-rows: 2
preconditions: []
expect:
  status: 200
  headers:
    Content-Range: 0-1/*
  body_exact: [{ "id": 1 }, { "id": 2 }]
notes: "With db-max-rows=2 the server caps results at 2 rows; total count is '*'. Mirrors QueryLimitedSpec.hs:16."
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Query/QueryLimitedSpec.hs#L16
