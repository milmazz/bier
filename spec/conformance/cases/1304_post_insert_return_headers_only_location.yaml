id: 1304
feature: representations/post/return-headers-only
request:
  method: POST
  path: /projects?select=name,client_id
  headers:
    Prefer: "return=headers-only"
    Content-Type: application/json
  body: { "id": 11, "name": "New Project", "client_id": 2 }
schema: representations
preconditions: []
expect:
  status: 201
  headers:
    Location: "/projects?id=eq.11"
    Content-Range: "*/*"
    Content-Length: "0"
    Preference-Applied: "return=headers-only"
  headers_absent: [Content-Type]
  body_exact: ""
notes: "return=headers-only yields 201, empty body, and a Location header pointing at the created row by PK. Mirrors InsertSpec.hs:131."
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Query/InsertSpec.hs#L131
