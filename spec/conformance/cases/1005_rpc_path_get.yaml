id: 1005
feature: url_grammar/path/rpc
request:
  method: GET
  path: /rpc/get_parents_below?id=6
  headers: { Accept: application/json }
schema: multi
preconditions: []
expect:
  status: 200
  headers:
    Content-Type: application/json; charset=utf-8
    Content-Profile: v1
  body_exact:
    - { "id": 1, "name": "parent v1-1" }
    - { "id": 2, "name": "parent v1-2" }
notes: "['rpc', name] path resolves to a routine; GET invokes it as read. Default profile v1. Mirrors MultipleSchemaSpec rpc default schema. schema 'multi' selects db-schemas=[v1,v2]"
