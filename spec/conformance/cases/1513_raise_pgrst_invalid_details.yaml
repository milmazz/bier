id: 1513
feature: errors/raise/pgrst_parse_error_detail
request:
  method: GET
  path: /rpc/raise_sqlstate_invalid_json_details
  headers: { Accept: application/json }
schema: test
preconditions: []
expect:
  status: 500
  body_exact:
    code: "PGRST121"
    message: "Could not parse JSON in the \"RAISE SQLSTATE 'PGRST'\" error"
    details: "Invalid JSON value for DETAIL: 'INVALID'"
    hint: "DETAIL must be a JSON object with obligatory keys: 'status', 'headers' and optional key: 'status_text'."
notes: >
  When the DETAIL of a RAISE 'PGRST' is not valid JSON, PostgREST returns
  PGRST121 with HTTP 500, echoing the raw DETAIL in details and the required
  DETAIL shape in hint. Mirrors RpcSpec.hs "returns error for invalid JSON in
  the DETAIL option of the RAISE statement".
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Query/RpcSpec.hs#L1425
