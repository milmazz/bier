id: 1603
feature: content_negotiation/json/any-rescue
request:
  method: GET
  path: /simple_pk
  headers: { Accept: "text/unknowntype, */*" }
schema: test
preconditions: []
expect:
  status: 200
  headers:
    Content-Type: application/json; charset=utf-8
notes: "A trailing */* rescues an otherwise-unknown leading type, resolving to JSON (200). Mirrors QuerySpec '*/* should rescue an unknown type'."
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Query/QuerySpec.hs#L1196
