id: 1272
feature: pagination/count/planned_full
request:
  method: HEAD
  path: /child_entities
  headers:
    Accept: application/json
    Prefer: count=planned
schema: pagination
preconditions:
  - "ANALYZE test.child_entities;"
expect:
  status: 200
  headers:
    Content-Type: "application/json; charset=utf-8"
    Content-Range: "0-5/6"
notes: >
  count=planned returns the planner's row estimate as the total. For a small
  analyzed table the planner estimate matches the 6 real rows, so Content-Range
  '0-5/6' and status 200 (window == total). Mirrors RangeSpec.hs:350.
  CAVEAT: the planned total is planner/version dependent; preconditions run
  ANALYZE so the estimate matches the 6 actual rows.
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Query/RangeSpec.hs#L350
