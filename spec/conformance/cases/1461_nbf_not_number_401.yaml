id: 1461
feature: auth/claims/nbf-not-number
request:
  method: GET
  path: /authors_only
  headers: { Accept: application/json }
  jwt:
    sign_with: hs256_test_secret
    payload: { "nbf": "invalid", "role": "postgrest_test_author" }
schema: auth
preconditions: []
expect:
  status: 401
  body_exact: { "code": "PGRST303", "details": null, "hint": null, "message": "The JWT 'nbf' claim must be a number" }
notes: "Non-numeric nbf -> PGRST303."
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Auth/AuthSpec.hs#L152
