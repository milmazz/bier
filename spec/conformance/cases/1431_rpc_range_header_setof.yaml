id: 1431
feature: rpc/setof/range-header
request:
  method: GET
  path: /rpc/getitemrange?min=2&max=4
  headers: { Accept: application/json, Range: "1-1" }
schema: rpc
preconditions: []
expect:
  status: 200
  headers:
    Content-Range: 1-1/*
  body_exact:
    - { "id": 4 }
notes: "On GET, the Range header paginates a SETOF proc result (offset 1, one row). Content-Range 1-1/* with no count."
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Query/RpcSpec.hs#L23
