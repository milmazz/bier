id: 1669
feature: openapi/defaults/detection
request:
  method: GET
  path: /
  headers: { Accept: application/json }
schema: openapi
preconditions: []
expect:
  status: 200
  body_jsonpath:
    - { path: "$.definitions.openapi_defaults.properties.text.default", equals: "default" }
    - { path: "$.definitions.openapi_defaults.properties.boolean.default", equals: false }
    - { path: "$.definitions.openapi_defaults.properties.integer.default", equals: 42 }
    - { path: "$.definitions.openapi_defaults.properties.numeric.default", equals: 42.2 }
    - { path: "$.definitions.openapi_defaults.properties.date.default", equals: "1900-01-01" }
    - { path: "$.definitions.openapi_defaults.properties.time.default", equals: "13:00:00" }
notes: "Column defaults surfaced as JSON-decoded default values; string casts/quotes stripped. Mirrors OpenApiSpec.hs:654-708"
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/OpenApi/OpenApiSpec.hs#L654
