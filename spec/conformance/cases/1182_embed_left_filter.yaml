id: 1182
feature: filters/embed/left
request:
  method: GET
  path: "/entities?child_entities.or=(id.eq.1,name.eq.child entity 2)&select=id,child_entities(id)"
  headers: { Accept: application/json }
schema: test
preconditions: []
expect:
  status: 200
  headers:
    Content-Type: application/json; charset=utf-8
  body_exact:
    - { "id": 1, "child_entities": [{ "id": 1 }, { "id": 2 }] }
    - { "id": 2, "child_entities": [] }
    - { "id": 3, "child_entities": [] }
    - { "id": 4, "child_entities": [] }
notes: >
  With the default left join, an embedded logic filter
  (child_entities.or=...) filters the embedded rows but keeps all parent rows
  (empty array when nothing matches). child_entity 1 (id.eq.1) and child_entity
  2 (name.eq."child entity 2") both belong to entity 1. Mirrors AndOrParamsSpec
  "can do logic on the second level".
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Query/AndOrParamsSpec.hs#L29
