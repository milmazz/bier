id: 1205
feature: ordering/nulls/desc_nullsfirst
request:
  method: GET
  path: /no_pk?order=a.desc.nullsfirst
  headers: { Accept: application/json }
schema: ordering
preconditions: []
expect:
  status: 200
  headers:
    Content-Range: "0-2/*"
  body_exact:
    - { "a": null, "b": null }
    - { "a": "2", "b": "0" }
    - { "a": "1", "b": "0" }
notes: "by a column desc with nulls first."
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Query/QuerySpec.hs#L1108
