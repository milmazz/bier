id: 1058
feature: operators/is/case_insensitive
request:
  method: GET
  path: /chores?done=is.NoT_NuLl
  headers: { Accept: application/json }
schema: operators
preconditions: []
expect:
  status: 200
  headers:
    Content-Type: application/json; charset=utf-8
  body_exact:
