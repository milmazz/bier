id: 1177
feature: filters/json/array_index
request:
  method: GET
  path: /json_arr?select=data&data->>-3=eq.1
  headers: { Accept: application/json }
schema: test
preconditions: []
expect:
  status: 200
  headers:
    Content-Type: application/json; charset=utf-8
  body_exact: [{ "data": [1, 2, 3] }]
notes: >
  Negative json array indexes are supported (-3 == element 0 of a 3-element
  array). Mirrors JsonOperatorSpec "can filter with negative indexes".
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Query/JsonOperatorSpec.hs#L282
