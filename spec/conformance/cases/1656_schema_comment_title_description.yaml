id: 1656
feature: openapi/comments/schema-title-description
request:
  method: GET
  path: /
  headers: { Accept: application/json }
schema: openapi
preconditions: []
expect:
  status: 200
  body_jsonpath:
    - { path: "$.info.title", equals: "My API title" }
    - { path: "$.info.description", equals: "My API description\nthat spans\nmultiple lines" }
notes: "Schema COMMENT: first line -> info.title, remainder (leading newlines stripped) -> info.description. Mirrors OpenApiSpec.hs:53-63"
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/OpenApi/OpenApiSpec.hs#L53
