id: 1161
feature: filters/logical/not
request:
  method: GET
  path: /entities?or=(not.and(name.eq.entity 2,id.eq.2),not.and(name.eq.entity 1,id.eq.1))&select=id
  headers: { Accept: application/json }
schema: test
preconditions: []
expect:
  status: 200
  headers:
    Content-Type: application/json; charset=utf-8
  body_exact: [{ "id": 1 }, { "id": 2 }, { "id": 3 }, { "id": 4 }]
notes: >
  not. can negate a nested and(...) group. Mirrors AndOrParamsSpec
  "can be negated while nested".
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Query/AndOrParamsSpec.hs#L58
