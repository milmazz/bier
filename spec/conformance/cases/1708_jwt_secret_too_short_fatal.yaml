id: 1708
feature: config/validation/jwt-secret-min-length
request:
  kind: cli
  flag: "--dump-config"
schema: config
config:
  env:
    PGRST_JWT_SECRET: "short_secret"
preconditions: []
expect:
  exit_code: nonzero
  stderr_contains: "The JWT secret must be at least 32 characters long."
notes: "A symmetric (text) jwt-secret shorter than 32 chars aborts startup. Mirrors test_cli.py:test_jwt_secret_min_length."
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/io/test_cli.py#L280
