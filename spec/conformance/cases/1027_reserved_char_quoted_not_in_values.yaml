id: 1027
feature: url_grammar/reserved-characters/quoted-not-in-values
request:
  method: GET
  path: /w_or_wo_comma_names?name=not.in.(%22Hebdon,%20John%22,%22Williams,%20Mary%22,%22Smith,%20Joseph%22)&limit=3
  headers:
    Accept: application/json
schema: test
preconditions: []
expect:
  status: 200
  headers:
    Content-Type: application/json; charset=utf-8
  body_exact:
    - { "name": "David White" }
    - { "name": "Larry Thompson" }
    - { "name": "Double O Seven(007)" }
notes: 'The same %22 double-quote quoting of reserved characters applies to not.in.(): the three comma-containing names are excluded, leaving the unquoted-name rows. Mirrors QuerySpec "succeeds when only quoted values are present" (upstream get "/w_or_wo_comma_names?name=not.in.(\"Hebdon, John\",\"Williams, Mary\",\"Smith, Joseph\")&limit=3").'
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Query/QuerySpec.hs#L1296
