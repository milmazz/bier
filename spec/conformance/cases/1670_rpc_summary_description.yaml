expect:
  status: 200
  body_jsonpath:
    - { path: "$.paths['/rpc/varied_arguments_openapi'].get.summary", equals: "An RPC function" }
    - { path: "$.paths['/rpc/varied_arguments_openapi'].get.description", equals: "Just a test for RPC function arguments" }
notes: "Function COMMENT -> RPC operation summary/description. Mirrors OpenApiSpec.hs:730-742"
