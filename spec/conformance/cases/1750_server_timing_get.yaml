id: 1750
feature: observability/server-timing/get
request:
  method: GET
  path: /organizations?id=eq.6
  headers: { Accept: application/json }
schema: observability
config:
  server-timing-enabled: true
preconditions: []
expect:
  status: 200
  headers:
    Content-Type: application/json; charset=utf-8
  headers_match:
    Server-Timing: "jwt;dur=[0-9]+\\.[0-9]+.*parse;dur=[0-9]+\\.[0-9]+.*plan;dur=[0-9]+\\.[0-9]+.*transaction;dur=[0-9]+\\.[0-9]+.*response;dur=[0-9]+\\.[0-9]+"
  body_exact: [{ "id": 6, "name": "Oscorp", "referee": 3, "auditor": 4, "manager_id": 6 }]
notes: >
  With server-timing-enabled, a GET emits Server-Timing with jwt, parse, plan,
  transaction, response metrics in that order, each "<name>;dur=<ms>" (one
  decimal). headers_match values are regexes mirroring PostgREST's
  matchServerTimingHasTiming. Mirrors ServerTimingSpec.hs:18-26.
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Query/ServerTimingSpec.hs#L18
