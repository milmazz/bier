id: 1654
feature: openapi/root/swagger-version-info
request:
  method: GET
  path: /
  headers: { Accept: application/json }
schema: openapi_no_schema_comment
preconditions:
  - "COMMENT ON SCHEMA test IS NULL"
expect:
  status: 200
  body_jsonpath:
    - { path: "$.swagger", equals: "2.0" }
    - { path: "$.info.title", equals: "PostgREST API" }
    - { path: "$.info.description", equals: "This is a dynamic API generated by PostgREST" }
notes: "Defaults for info.title/description when the schema has no COMMENT. Defaults from OpenAPI.hs postgrestSpec; precondition removes the fixture schema comment."
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/src/PostgREST/Response/OpenAPI.hs#L398
