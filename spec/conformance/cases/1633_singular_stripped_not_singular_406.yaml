id: 1633
feature: content_negotiation/nulls-stripped/singular-not-singular-406
request:
  method: GET
  path: /organizations?select=*
  headers: { Accept: application/vnd.pgrst.object+json;nulls=stripped }
schema: test
preconditions: []
expect:
  status: 406
  headers:
    Content-Type: application/json; charset=utf-8
  body_exact:
    code: PGRST116
    details: "The result contains 6 rows"
    hint: null
    message: "Cannot coerce the result to a single JSON object"
notes: >-
  The stripped singular media type still enforces singular plurality: when the
  result is not exactly one row it fails 406 / PGRST116 with a plain
  application/json error body (NOT the stripped object media type). Mirrors
  NullsStripSpec 'throws error when Accept:
  application/vnd.pgrst.object+json;nulls=stripped and result not singular'.
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Query/NullsStripSpec.hs#L68
