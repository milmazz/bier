id: 1635
feature: content_negotiation/nulls-stripped/array-plain-keeps-nulls
request:
  method: GET
  path: /organizations?select=id,referee,auditor
  headers: { Accept: application/vnd.pgrst.array+json }
schema: test
preconditions: []
expect:
  status: 200
  headers:
    Content-Type: application/json; charset=utf-8
  body_exact:
    - { id: 1, referee: null, auditor: null }
    - { id: 2, referee: null, auditor: null }
    - { id: 3, referee: 1, auditor: 2 }
    - { id: 4, referee: 1, auditor: 2 }
    - { id: 5, referee: 3, auditor: 4 }
    - { id: 6, referee: 3, auditor: 4 }
notes: >-
  Contrast case: application/vnd.pgrst.array+json WITHOUT nulls=stripped decodes
  back to plain MTApplicationJSON, keeps null keys, and responds with
  Content-Type application/json; charset=utf-8 (not the vendored array type).
  Mirrors NullsStripSpec 'doesn't strip nulls' -> 'doesn't strips nulls when
  Accept: application/vnd.pgrst.array+json'.
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Query/NullsStripSpec.hs#L118
