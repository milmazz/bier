id: 1123
feature: select/embed/hint-by-column
request:
  method: GET
  path: /projects?id=in.(1,3)&select=id,name,client_id(id,name)
  headers: { Accept: application/json }
schema: test
preconditions: []
expect:
  status: 200
  headers:
    Content-Type: application/json; charset=utf-8
  body_exact: [{"id":1,"name":"Windows 7","client_id":{"id":1,"name":"Microsoft"}},{"id":3,"name":"IOS","client_id":{"id":2,"name":"Apple"}}]
notes: "can embed by the FK column name; the embed key is the column name (EmbedDisambiguationSpec.hs:257)"
