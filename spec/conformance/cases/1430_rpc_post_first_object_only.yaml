id: 1430
feature: rpc/args/post-first-object-only
request:
  method: POST
  path: /rpc/add_them
  headers: { Content-Type: application/json, Accept: application/json }
  body:
    - { "a": 1, "b": 2 }
    - { "a": 4, "b": 6 }
    - { "a": 100, "b": 200 }
schema: rpc
preconditions: []
expect:
  status: 200
  headers:
    Content-Type: application/json; charset=utf-8
  body_exact: 3
notes: "When a POST body is an array of objects, only the first object binds the args; add_them(1,2)=3."
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Query/RpcSpec.hs#L860
