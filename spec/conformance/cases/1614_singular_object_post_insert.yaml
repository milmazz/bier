id: 1614
feature: content_negotiation/singular/post-insert
request:
  method: POST
  path: /addresses
  headers:
    Accept: application/vnd.pgrst.object+json
    Content-Type: application/json
    Prefer: return=representation
  body_json:
    - { "id": 102, "address": "xxx" }
schema: test
preconditions: []
expect:
  status: 201
  headers:
    Content-Type: application/vnd.pgrst.object+json; charset=utf-8
  body_exact: { "id": 102, "address": "xxx" }
notes: "POST insert of one row with return=representation + singular returns 201 and the single object. Mirrors SingularSpec 'works for one row with return=rep' (creating rows)."
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Query/SingularSpec.hs#L117
