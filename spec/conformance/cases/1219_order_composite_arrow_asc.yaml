  path: /fav_numbers?order=num->i.asc
  headers: { Accept: application/json }
schema: ordering
preconditions: []
expect:
  status: 200
  headers:
    Content-Type: application/json; charset=utf-8
  body_exact:
    - { "num": { "r": 0.5, "i": 0.5 }, "person": "A" }
