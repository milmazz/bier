id: 1169
feature: filters/logical/whitespace
request:
  method: GET
  path: "/entities?and=( and ( id.in.( 1, 2, 3 ) , id.eq.3 ) , or ( id.eq.2 , id.eq.3 ) )&select=id"
  headers: { Accept: application/json }
schema: test
preconditions: []
expect:
  status: 200
  headers:
    Content-Type: application/json; charset=utf-8
  body_exact: [{ "id": 3 }]
notes: >
  Whitespace is allowed around parens, commas, and and/or keywords in a
  logic tree. Mirrors AndOrParamsSpec "allows whitespace".
