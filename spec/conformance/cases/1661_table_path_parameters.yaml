    - { path: "$.paths['/child_entities'].get.parameters[4]['$ref']", equals: "#/parameters/order" }
    - { path: "$.paths['/child_entities'].get.parameters[5]['$ref']", equals: "#/parameters/range" }
    - { path: "$.paths['/child_entities'].get.parameters[6]['$ref']", equals: "#/parameters/rangeUnit" }
    - { path: "$.paths['/child_entities'].get.parameters[7]['$ref']", equals: "#/parameters/offset" }
    - { path: "$.paths['/child_entities'].get.parameters[8]['$ref']", equals: "#/parameters/limit" }
    - { path: "$.paths['/child_entities'].get.parameters[9]['$ref']", equals: "#/parameters/preferCount" }
