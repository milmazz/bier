id: 1469
feature: auth/audience/string-mismatch
request:
  method: GET
  path: /authors_only
  headers: { Accept: application/json }
  jwt:
    sign_with: hs256_test_secret
    payload: { "exp": 9999999999, "role": "postgrest_test_author", "id": "jdoe", "aud": "notyouraudience" }
schema: auth
config:
  jwt-aud: youraudience
preconditions: []
expect:
  status: 401
  body_exact: { "code": "PGRST303", "details": null, "hint": null, "message": "JWT not in audience" }
notes: "String aud not matching jwt-aud -> PGRST303 JWT not in audience."
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Auth/AudienceJwtSecretSpec.hs#L29
