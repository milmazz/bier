id: 1557
feature: headers/profile/default-schema
request:
  method: GET
  path: /parents
  headers: { Accept: application/json }
schema: headers
preconditions: []
expect:
  status: 200
  headers:
    Content-Type: application/json; charset=utf-8
    Content-Profile: v1
  body_exact:
    - { "id": 1, "name": "parent v1-1" }
    - { "id": 2, "name": "parent v1-2" }
notes: "No Accept-Profile -> first exposed schema (v1) is used and echoed in Content-Profile. Mirrors MultipleSchemaSpec.hs:22-31."
source: https://raw.githubusercontent.com/PostgREST/postgrest/v14.12/test/spec/Feature/Query/MultipleSchemaSpec.hs#L22
