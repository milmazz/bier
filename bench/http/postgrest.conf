# PostgREST v14.12 benchmark config — parity with bench/http/start_bier.exs.
# BENCH_DB_URI and POSTGREST_PORT are injected by run.sh via PostgREST's
# $(ENV_VAR) config interpolation.
db-uri = "$(BENCH_DB_URI)"
db-schemas = "bench"
db-anon-role = "bench_anon"
db-pool = 10
db-channel-enabled = false
server-host = "127.0.0.1"
server-port = "$(POSTGREST_PORT)"
log-level = "crit"
